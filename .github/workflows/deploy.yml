name: CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          VITE_API_URL=/chat npm run build

      - name: Copy Files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/*,frontend/dist/*,landingpage/*"
          target: "/home/kapil/apps/knyxjs/chat"
          rm: false # Don't delete .env on server

      - name: Post-Deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/kapil/apps/knyxjs/chat
            # Update public assets
            mkdir -p backend/public/dashboard
            cp -r frontend/dist/* backend/public/dashboard/
            cp -r landingpage/* backend/public/
            # Install backend dependencies & restart
            cd backend
            npm install --production
            pm2 restart chattrix-backend || pm2 start server.js --name "chattrix-backend"
